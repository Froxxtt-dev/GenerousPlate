<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support • Generous Plate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/site.css">
    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/site.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="flex min-h-screen flex-col bg-[#FDFBF0] text-stone-800">

    <div id="nav-overlay" onclick="closeNavDrawer()" class="fixed inset-0 z-[60] bg-black/40 opacity-0 pointer-events-none transition-opacity duration-300 md:hidden" aria-hidden="true"></div>

    <aside id="nav-drawer" class="fixed top-0 left-0 z-[70] flex h-full w-[min(18rem,88vw)] -translate-x-full flex-col border-r border-[#e9d5a8] bg-white shadow-xl transition-transform duration-300 ease-out md:hidden">
        <div class="flex items-center justify-between border-b border-[#f5ead8] px-4 py-3">
            <span class="text-xs font-semibold uppercase tracking-wide text-[#8B7355]">Menu</span>
            <button type="button" onclick="closeNavDrawer()" class="rounded-lg p-2 text-stone-600 hover:bg-[#fdf8eb]" aria-label="Close menu">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>
        </div>
        <nav class="flex-1 space-y-0.5 p-3" aria-label="Mobile navigation">
            <a href="index.html" onclick="closeNavDrawer()" class="block rounded-lg px-3 py-2.5 text-sm font-medium text-stone-700 hover:bg-[#fdf8eb] hover:text-[#8B6914]">Home</a>
            <a href="menu.html" onclick="closeNavDrawer()" class="block rounded-lg px-3 py-2.5 text-sm font-medium text-stone-700 hover:bg-[#fdf8eb] hover:text-[#8B6914]">Menu</a>
            <a href="checkout.html" onclick="closeNavDrawer()" class="block rounded-lg px-3 py-2.5 text-sm font-medium text-stone-700 hover:bg-[#fdf8eb] hover:text-[#8B6914]">Cart</a>
            <a href="support.html" onclick="closeNavDrawer()" class="block rounded-lg bg-[#fdf8eb] px-3 py-2.5 text-sm font-medium text-[#6b5420]">Support</a>
        </nav>
    </aside>

    <nav class="sticky top-0 z-50 border-b border-[#e9d5a8] bg-white/95 backdrop-blur">
        <div class="mx-auto flex max-w-6xl items-center justify-between gap-3 px-4 py-2.5 md:px-6 md:py-3">
            <div class="flex min-w-0 items-center gap-2">
                <button type="button" class="shrink-0 rounded-lg p-2 text-stone-700 hover:bg-[#fdf8eb] md:hidden" onclick="openNavDrawer()" aria-label="Open navigation">
                    <i class="fa-solid fa-bars text-lg"></i>
                </button>
                <a href="index.html" class="flex min-w-0 items-center">
                    <img src="assets/logo.png" alt="Generous Plate" class="h-9 w-auto max-h-11 object-contain object-left md:h-11" width="180" height="44">
                </a>
            </div>
            <div class="hidden items-center gap-1 md:flex">
                <a href="index.html" class="rounded-lg px-3 py-2 text-sm font-medium text-stone-600 hover:bg-[#fdf8eb] hover:text-[#8B6914]">Home</a>
                <a href="menu.html" class="rounded-lg px-3 py-2 text-sm font-medium text-stone-600 hover:bg-[#fdf8eb] hover:text-[#8B6914]">Menu</a>
                <a href="checkout.html" class="rounded-lg px-3 py-2 text-sm font-medium text-stone-600 hover:bg-[#fdf8eb] hover:text-[#8B6914]">Cart</a>
                <a href="support.html" class="rounded-lg bg-[#fdf8eb] px-3 py-2 text-sm font-medium text-[#6b5420]">Support</a>
            </div>
            <a href="checkout.html" class="relative flex shrink-0 items-center gap-1.5 rounded-full border border-[#e9d5a8] bg-[#fdf8eb] px-2.5 py-1.5 text-sm font-medium text-[#5c4d2c] hover:border-[#C5A059]/50 sm:gap-2 sm:px-3">
                <i class="fa-solid fa-basket-shopping text-[#C5A059]"></i>
                <span class="hidden sm:inline">Cart</span>
                <span id="cart-count" class="flex h-5 min-w-[1.25rem] items-center justify-center rounded-full bg-[#C5A059] px-1 text-[11px] font-bold text-white">0</span>
            </a>
        </div>
    </nav>

    <main class="mx-auto w-full max-w-3xl flex-1 px-4 py-8 md:px-6 md:py-12">
        <h1 class="text-center text-2xl font-bold text-slate-900 md:text-3xl">Help centre</h1>
        <p class="mx-auto mt-2 max-w-md text-center text-sm text-slate-600">Orders, donations, and delivery. Get quick answers below.</p>

        <section class="mt-10 rounded-2xl border border-slate-200 bg-white p-5 shadow-sm md:p-6">
            <h2 class="flex items-center gap-2 text-base font-semibold text-slate-900">
                <i class="fa-regular fa-circle-question text-[#C5A059]"></i> FAQs
            </h2>
            <div class="mt-4 space-y-2" id="faqContainer"></div>
        </section>

        <section class="mt-8 rounded-2xl border border-slate-200 bg-white p-5 shadow-sm md:p-6">
            <h2 class="text-base font-semibold text-slate-900">Message us</h2>
            <form onsubmit="submitContactForm(event)" class="mt-4 grid gap-4 sm:grid-cols-2">
                <div class="sm:col-span-1">
                    <label for="contactName" class="mb-1 block text-xs font-medium text-slate-600">Name</label>
                    <input id="contactName" type="text" required class="w-full rounded-xl border border-slate-200 px-3 py-2.5 text-sm focus:border-[#C5A059] focus:outline-none focus:ring-1 focus:ring-[#C5A059]">
                </div>
                <div class="sm:col-span-1">
                    <label for="contactEmail" class="mb-1 block text-xs font-medium text-slate-600">Email or phone</label>
                    <input id="contactEmail" type="text" required class="w-full rounded-xl border border-slate-200 px-3 py-2.5 text-sm focus:border-[#C5A059] focus:outline-none focus:ring-1 focus:ring-[#C5A059]">
                </div>
                <div class="sm:col-span-2">
                    <label for="contactMessage" class="mb-1 block text-xs font-medium text-slate-600">Your question</label>
                    <textarea id="contactMessage" rows="4" required class="w-full rounded-xl border border-slate-200 px-3 py-2.5 text-sm focus:border-[#C5A059] focus:outline-none focus:ring-1 focus:ring-[#C5A059]"></textarea>
                </div>
                <div class="sm:col-span-2">
                    <button type="submit" class="w-full rounded-full bg-[#C5A059] py-3 text-sm font-semibold text-white hover:bg-[#b08d4f]">Send</button>
                </div>
            </form>
        </section>

        <div class="mt-10 flex flex-wrap justify-center gap-3">
            <a href="tel:0241234567" onclick="event.preventDefault(); fakeCallSupport();" class="inline-flex items-center gap-2 rounded-full border border-stone-200 bg-white px-4 py-2 text-sm font-medium text-stone-700 shadow-sm hover:border-[#C5A059]/40">
                <i class="fa-solid fa-phone text-[#C5A059]"></i> 030 077 4507
            </a>
            <a href="https://wa.me/233241234567" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 rounded-full border border-stone-200 bg-white px-4 py-2 text-sm font-medium text-stone-700 shadow-sm hover:border-[#C5A059]/40">
                <i class="fa-brands fa-whatsapp text-[#C5A059]"></i> WhatsApp
            </a>
            <a href="mailto:hello@generousplate.com" class="inline-flex items-center gap-2 rounded-full border border-stone-200 bg-white px-4 py-2 text-sm font-medium text-stone-700 shadow-sm hover:border-[#C5A059]/40">
                <i class="fa-solid fa-envelope text-[#C5A059]"></i> Email
            </a>
        </div>
    </main>

    <!-- Floating chat -->
    <div class="fixed bottom-4 right-4 z-[80] flex max-w-[calc(100vw-2rem)] flex-col items-end gap-2 sm:bottom-6 sm:right-6">
        <div id="chatPanel" class="hidden flex w-[min(100%,20rem)] flex-col overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-xl sm:w-[22rem]">
            <div class="flex items-center gap-3 border-b border-[#e9d5a8] bg-gradient-to-r from-[#1a1a1a] to-[#2d2a26] px-4 py-3 text-white">
                <img src="https://img.freepik.com/free-photo/close-up-portrait-african-american-girl-coloured-shirt-sitting-outdoor-fashionable-black-woman_627829-13743.jpg?semt=ais_hybrid&w=740&q=80" alt="" class="h-10 w-10 rounded-full object-cover ring-2 ring-[#C5A059]/50" width="40" height="40">
                <div class="min-w-0 flex-1">
                    <p class="truncate text-sm font-semibold">Kuku • Support</p>
                    <p class="text-[11px] text-[#d4c4a8]">Typically replies in under a minute</p>
                </div>
                <button type="button" onclick="toggleLiveChat()" class="rounded-lg p-1.5 hover:bg-white/10" aria-label="Close chat">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div id="chatMessages" class="max-h-[min(50vh,16rem)] space-y-3 overflow-y-auto bg-slate-50 p-3 sm:max-h-60"></div>
            <div class="flex gap-2 border-t border-slate-100 bg-white p-3">
                <input id="chatInput" type="text" placeholder="Type a message…" class="min-w-0 flex-1 rounded-full border border-slate-200 px-3 py-2 text-sm focus:border-[#C5A059] focus:outline-none focus:ring-1 focus:ring-[#C5A059]" onkeydown="if(event.key==='Enter'){event.preventDefault();sendChatMessage();}">
                <button type="button" onclick="sendChatMessage()" class="shrink-0 rounded-full bg-[#C5A059] px-4 py-2 text-sm font-semibold text-white hover:bg-[#b08d4f]">Send</button>
            </div>
        </div>
        <button type="button" onclick="toggleLiveChat()" class="flex h-12 w-12 items-center justify-center rounded-full bg-[#C5A059] text-white shadow-lg ring-2 ring-white hover:bg-[#b08d4f] sm:h-14 sm:w-14" aria-label="Open chat">
            <i class="fa-solid fa-comments text-lg sm:text-xl"></i>
        </button>
    </div>

    <footer class="mt-auto border-t border-[#e9d5a8] bg-white py-4 md:py-5">
        <div class="mx-auto grid max-w-6xl grid-cols-1 items-center gap-4 px-4 text-sm md:grid-cols-3 md:gap-6 md:px-6">
            <nav class="flex flex-wrap justify-center gap-x-6 gap-y-2 text-stone-600" aria-label="Footer">
                <a href="index.html" class="hover:text-[#C5A059]">Home</a>
                <a href="menu.html" class="hover:text-[#C5A059]">Menu</a>
                <a href="support.html" class="hover:text-[#C5A059]">Support</a>
            </nav>
            <div class="flex flex-wrap items-center justify-center gap-5 md:justify-end">
                <div class="flex items-center gap-4 text-[#5c4d2c]">
                    <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" class="hover:text-[#C5A059]" aria-label="Instagram"><i class="fa-brands fa-instagram text-lg"></i></a>
                    <a href="https://wa.me/" target="_blank" rel="noopener noreferrer" class="hover:text-[#C5A059]" aria-label="WhatsApp"><i class="fa-brands fa-whatsapp text-lg"></i></a>
                    <a href="https://x.com" target="_blank" rel="noopener noreferrer" class="hover:text-[#C5A059]" aria-label="X"><i class="fa-brands fa-x-twitter text-lg"></i></a>
                </div>
                <span class="whitespace-nowrap text-xs font-semibold tracking-wide text-[#C5A059]">Made by Frost</span>
            </div>
            <p class="text-center text-xs text-stone-500 md:text-left">© 2026 Generous Plate</p>
        </div>
    </footer>

    <div id="toast" class="fixed bottom-24 right-4 z-[90] hidden max-w-sm items-start gap-3 rounded-2xl border border-[#e9d5a8] bg-[#C5A059] px-4 py-3 text-sm text-white shadow-xl sm:bottom-8 sm:right-8">
        <i class="fa-solid fa-circle-check mt-0.5 text-lg"></i>
        <span id="toastMessage"></span>
    </div>

    <script>
        function initializeTailwind() {
            tailwind.config = { content: ["./**/*.{html,js}"] };
        }

        const faqs = [
            { q: "How do I track my order?", a: "After checkout, use Track delivery to follow your rider in real time with live status updates." },
            { q: "What happens to my donation?", a: "Optional amounts at checkout go to partner programmes that provide meals in Accra." },
            { q: "How long does delivery take?", a: "Most orders arrive in 20–40 minutes depending on distance and traffic." },
            { q: "Can I cancel my order?", a: "You can cancel within a few minutes of placing if the kitchen has not started prep." },
            { q: "Do you accept cash on delivery?", a: "We focuse on MoMo and card; cash on delivery will be accepted in the future." }
        ];

        function renderFAQs() {
            const container = document.getElementById('faqContainer');
            container.innerHTML = faqs.map((faq, index) => `
                <div class="faq-item rounded-xl border border-slate-100 bg-slate-50/50">
                    <button type="button" onclick="toggleFAQ(${index})" class="flex w-full items-center justify-between gap-3 px-4 py-3 text-left text-sm font-medium text-slate-900">
                        <span>${faq.q}</span>
                        <i id="faq-icon-${index}" class="fa-solid fa-chevron-down shrink-0 text-xs text-slate-400 transition-transform"></i>
                    </button>
                    <div id="faq-answer-${index}" class="hidden border-t border-slate-100 px-4 py-3 text-sm leading-relaxed text-slate-600">${faq.a}</div>
                </div>`).join('');
        }

        function toggleFAQ(index) {
            const answer = document.getElementById('faq-answer-' + index);
            const icon = document.getElementById('faq-icon-' + index);
            const wasHidden = answer.classList.contains('hidden');
            document.querySelectorAll('[id^="faq-answer-"]').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('[id^="faq-icon-"]').forEach(el => { el.style.transform = ''; });
            if (wasHidden) {
                answer.classList.remove('hidden');
                icon.style.transform = 'rotate(180deg)';
            }
        }

        function toggleLiveChat() {
            const panel = document.getElementById('chatPanel');
            panel.classList.toggle('hidden');
            if (!panel.classList.contains('hidden') && document.getElementById('chatMessages').children.length === 0) {
                addChatMessage('Hi, I’m here if you need help with an order or a donation.', 'support');
            }
        }

        function addChatMessage(text, sender) {
            const container = document.getElementById('chatMessages');
            const wrap = document.createElement('div');
            wrap.className = sender === 'support' ? 'flex justify-start' : 'flex justify-end';
            const bubble = sender === 'support'
                ? 'max-w-[85%] rounded-2xl rounded-bl-sm bg-white px-3 py-2 text-xs text-slate-800 shadow-sm border border-slate-100'
                : 'max-w-[85%] rounded-2xl rounded-br-sm bg-[#C5A059] px-3 py-2 text-xs text-white';
            wrap.innerHTML = `<div class="${bubble}">${text}</div>`;
            container.appendChild(wrap);
            container.scrollTop = container.scrollHeight;
        }

        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;
            addChatMessage(text, 'user');
            input.value = '';
            setTimeout(() => {
                const replies = [
                    'Thanks — I’ve noted that. Your rider ETA is still visible in tracking.',
                    'We can help with that. One moment while I check the kitchen status.',
                    'Appreciate your message. Is there anything else about your delivery?',
                    'Got it. If payment shows pending, wait for the MoMo prompt to finish.'
                ];
                addChatMessage(replies[Math.floor(Math.random() * replies.length)], 'support');
            }, 900);
        }

        function submitContactForm(e) {
            e.preventDefault();
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').innerHTML = '<strong>Message sent</strong><br><span class="text-[#fdf8eb] text-xs opacity-95">We’ll reply shortly.</span>';
            toast.classList.remove('hidden');
            toast.classList.add('flex');
            e.target.reset();
            setTimeout(() => {
                toast.classList.add('hidden');
                toast.classList.remove('flex');
            }, 4000);
        }

        function fakeCallSupport() {
            alert('Demo: would start a call to 024 123 4567.');
        }

        window.onload = function() {
            initializeTailwind();
            updateCartCount();
            renderFAQs();
        };
    </script>
</body>
</html>
